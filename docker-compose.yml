version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_pass
      POSTGRES_DB: youtube_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Full Pentaho PDI with pan.sh and kitchen.sh
  pentaho:
    image: wmarinho/pentaho-data-integration:9.1.0.0-324
    container_name: pentaho-pdi
    volumes:
      - ./pentaho/jobs:/pentaho-jobs
      - ./src:/pipeline-src
    environment:
      - PENTAHO_DI_JAVA_OPTIONS=-Xms2048m -Xmx4096m
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    driver: bridge